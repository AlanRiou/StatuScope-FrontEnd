name: Trivy - Container & Dependency Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy filesystem results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  trivy-container:
    name: Trivy Container Image Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build \
            --build-arg EXPO_PUBLIC_API_URL=https://placeholder.example.com \
            --build-arg EXPO_PUBLIC_FIREBASE_API_KEY=placeholder \
            --build-arg EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=placeholder \
            --build-arg EXPO_PUBLIC_FIREBASE_PROJECT_ID=placeholder \
            --build-arg EXPO_PUBLIC_FIREBASE_APP_ID=placeholder \
            -t statuscope-frontend:scan .

      - name: Run Trivy container image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: statuscope-frontend:scan
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy container results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-container

      - name: Export human-readable report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: statuscope-frontend:scan
          format: table
          severity: CRITICAL,HIGH

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-frontend-report-${{ github.run_number }}
          path: trivy-image-results.sarif
          retention-days: 30
